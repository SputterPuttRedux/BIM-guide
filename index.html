<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIM — Guide to Barbados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Work+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-page: #0c1821;
  --bg-card: #152028;
  --bg-card-hover: #1a2a35;
  --bg-surface: #1e3040;
  --text-primary: #f0f4f8;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #22d3ee;
  --accent-dim: rgba(34, 211, 238, 0.15);
  --coral: #fb7185;
  --amber: #fbbf24;
  --emerald: #34d399;
  --border: rgba(255, 255, 255, 0.08);
  --border-active: rgba(34, 211, 238, 0.4);
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  --radius: 16px;
  --radius-sm: 8px;
  --transition: 0.2s ease;
}

[data-theme="light"] {
  --bg-page: #f8fafc;
  --bg-card: #ffffff;
  --bg-card-hover: #f1f5f9;
  --bg-surface: #e2e8f0;
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --accent: #0891b2;
  --accent-dim: rgba(8, 145, 178, 0.1);
  --coral: #e11d48;
  --amber: #d97706;
  --emerald: #059669;
  --border: rgba(0, 0, 0, 0.08);
  --border-active: rgba(8, 145, 178, 0.4);
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Work Sans', -apple-system, sans-serif;
  background: var(--bg-page);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

.container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
}

header {
  padding: 32px 0 24px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 32px;
  position: sticky;
  top: 0;
  background: var(--bg-page);
  z-index: 100;
}

.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 12px;
}

.brand-flag {
  font-size: 1.5rem;
  line-height: 1;
}

.brand h1 {
  font-family: 'Fraunces', serif;
  font-size: 1.75rem;
  font-weight: 600;
  letter-spacing: -0.02em;
}

.brand h1 span {
  color: var(--accent);
  font-style: italic;
  font-weight: 400;
}

.brand-sub {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.theme-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
}

.theme-btn:hover {
  border-color: var(--accent);
  color: var(--text-primary);
}

nav {
  display: flex;
  gap: 8px;
  padding: 16px 0;
  overflow-x: auto;
  scrollbar-width: none;
}

nav::-webkit-scrollbar { display: none; }

.nav-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text-secondary);
  font-family: inherit;
  font-size: 0.9rem;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
}

.nav-btn:hover {
  background: var(--accent-dim);
  border-color: var(--border-active);
  color: var(--text-primary);
}

.nav-btn.active {
  background: var(--accent);
  border-color: var(--accent);
  color: #0c1821;
}

.nav-btn .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  padding: 2px 8px;
  background: rgba(0, 0, 0, 0.15);
  border-radius: 100px;
}

.nav-btn:not(.active) .count {
  background: var(--bg-surface);
}

.section-label {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 40px 0 20px;
  padding: 0 4px;
}

.section-label span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  white-space: nowrap;
}

.section-label.fancy span { color: var(--amber); }
.section-label.regular span { color: var(--emerald); }

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
  padding-bottom: 60px;
}

.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: all var(--transition);
  display: flex;
  flex-direction: column;
}

.card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-active);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.card-img {
  width: 100%;
  height: 180px;
  background: var(--bg-surface);
  overflow: hidden;
  position: relative;
}

.card-img img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s ease;
}

.card:hover .card-img img {
  transform: scale(1.05);
}

.card-img-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Fraunces', serif;
  font-size: 3rem;
  font-style: italic;
  color: var(--text-muted);
  background: linear-gradient(135deg, var(--bg-surface) 0%, var(--bg-card) 100%);
}

.card-body {
  padding: 16px 20px 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex: 1;
}

.card-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}

.card-name {
  font-family: 'Fraunces', serif;
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1.3;
  text-transform: capitalize;
}

.card-tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 4px 10px;
  border-radius: 100px;
  white-space: nowrap;
  flex-shrink: 0;
}

.tag-outdoors { background: rgba(52, 211, 153, 0.15); color: var(--emerald); }
.tag-food { background: rgba(251, 113, 133, 0.15); color: var(--coral); }
.tag-beaches { background: rgba(34, 211, 238, 0.15); color: var(--accent); }

.card-note {
  font-size: 0.9rem;
  color: var(--text-secondary);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.card-actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}

.btn {
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  cursor: pointer;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: all var(--transition);
}

.btn-primary {
  background: var(--accent-dim);
  border-color: rgba(34, 211, 238, 0.3);
  color: var(--accent);
}

.btn-primary:hover {
  background: rgba(34, 211, 238, 0.25);
  border-color: var(--accent);
}

.btn-secondary {
  background: transparent;
  border-color: var(--border);
  color: var(--text-muted);
}

.btn-secondary:hover {
  border-color: var(--text-muted);
  color: var(--text-secondary);
}

.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease;
}

.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transform: translateY(20px) scale(0.98);
  transition: transform 0.25s ease;
}

.modal-overlay.open .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
}

.modal-title {
  font-family: 'Fraunces', serif;
  font-size: 1.4rem;
  font-weight: 600;
  text-transform: capitalize;
}

.modal-close {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  color: var(--text-secondary);
  font-size: 1.25rem;
  cursor: pointer;
  transition: all var(--transition);
}

.modal-close:hover {
  background: var(--bg-card-hover);
  border-color: var(--coral);
  color: var(--coral);
}

.modal-note {
  padding: 16px 24px;
  font-size: 0.95rem;
  font-style: italic;
  color: var(--text-secondary);
  line-height: 1.6;
  border-bottom: 1px solid var(--border);
  background: var(--bg-surface);
}

.modal-map {
  flex: 1;
  min-height: 400px;
  background: var(--bg-surface);
  position: relative;
}

.modal-map iframe {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  position: absolute;
  inset: 0;
}

.modal-no-map {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 60px 24px;
  text-align: center;
}

.modal-no-map-icon {
  font-size: 2.5rem;
  opacity: 0.4;
}

.modal-no-map p {
  font-size: 0.9rem;
  color: var(--text-muted);
  max-width: 300px;
}

.modal-footer {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  background: var(--bg-card);
}

.modal-footer .btn {
  flex: 1;
  justify-content: center;
  padding: 12px 16px;
}

@media (max-width: 640px) {
  .container { padding: 0 16px; }
  header { padding: 20px 0 16px; }
  .brand h1 { font-size: 1.4rem; }
  .brand-sub { display: none; }
  .theme-btn span:last-child { display: none; }
  .grid { grid-template-columns: 1fr; gap: 16px; }
  .modal { max-height: 95vh; }
  .modal-map { min-height: 300px; }
  .modal-footer { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <div class="header-inner">
      <div class="brand">
        <span class="brand-flag">🇧🇧</span>
        <div>
          <h1>BIM — <span>Dionne's M*therFuggin Guide</span></h1>
          <p class="brand-sub">Barbados &middot; curated with love</p>
        </div>
      </div>
      <button class="theme-btn" id="themeBtn">
        <span id="themeIcon">☀️</span>
        <span id="themeLabel">Light mode</span>
      </button>
    </div>
    <nav id="nav"></nav>
  </header>

  <main id="main"></main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modalTitle">Location</h2>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-note" id="modalNote"></div>
    <div class="modal-map" id="modalMap"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

var currentFilter = 'all';
var tagLabels = { outdoors: 'Outdoors', food: 'Food & Bars', beaches: 'Beach' };
var subcatLabels = {
  fancy: { cls: 'fancy', label: '✨ Fancy / Schmancy' },
  regular: { cls: 'regular', label: '🍌 Regular / Degular but Worthwhile' }
};

function slugify(name) {
  return name.toLowerCase()
    .replace(/['']/g, '')
    .replace(/[^a-z0-9]+/g, '-')
    .replace(/^-+|-+$/g, '');
}

function renderNav() {
  var nav = document.getElementById('nav');
  nav.innerHTML = '';
  
  var counts = {
    all: locations.length,
    outdoors: locations.filter(function(l) { return l.category === 'outdoors'; }).length,
    food: locations.filter(function(l) { return l.category === 'food'; }).length,
    beaches: locations.filter(function(l) { return l.category === 'beaches'; }).length
  };
  
  var cats = [
    { key: 'all', label: 'All' },
    { key: 'outdoors', label: '🌿 Outdoors & Nature' },
    { key: 'food', label: '🏨 Food & Bars' },
    { key: 'beaches', label: '🏖️ Beaches' }
  ];
  
  cats.forEach(function(cat) {
    var btn = document.createElement('button');
    btn.className = 'nav-btn' + (currentFilter === cat.key ? ' active' : '');
    btn.innerHTML = cat.label + ' <span class="count">' + counts[cat.key] + '</span>';
    btn.addEventListener('click', function() {
      currentFilter = cat.key;
      renderNav();
      renderMain();
    });
    nav.appendChild(btn);
  });
}

function createCard(loc, idx) {
  var card = document.createElement('div');
  card.className = 'card';
  
  var imgContainer = document.createElement('div');
  imgContainer.className = 'card-img';
  
  var img = document.createElement('img');
  var slug = slugify(loc.name);
  var exts = ['jpg', 'jpeg', 'png', 'webp'];
  var extIdx = 0;
  img.src = 'images/' + slug + '.' + exts[extIdx];
  img.alt = loc.name;
  
  img.addEventListener('error', function() {
    extIdx++;
    if (extIdx < exts.length) {
      img.src = 'images/' + slug + '.' + exts[extIdx];
    } else {
      var placeholder = document.createElement('div');
      placeholder.className = 'card-img-placeholder';
      placeholder.textContent = loc.name.charAt(0).toUpperCase();
      imgContainer.innerHTML = '';
      imgContainer.appendChild(placeholder);
    }
  });
  
  imgContainer.appendChild(img);
  card.appendChild(imgContainer);
  
  var body = document.createElement('div');
  body.className = 'card-body';
  
  var top = document.createElement('div');
  top.className = 'card-top';
  
  var name = document.createElement('div');
  name.className = 'card-name';
  name.textContent = loc.name;
  top.appendChild(name);
  
  var tag = document.createElement('span');
  tag.className = 'card-tag tag-' + loc.category;
  tag.textContent = tagLabels[loc.category];
  top.appendChild(tag);
  
  body.appendChild(top);
  
  if (loc.notes) {
    var note = document.createElement('div');
    note.className = 'card-note';
    note.textContent = loc.notes;
    body.appendChild(note);
  }
  
  var actions = document.createElement('div');
  actions.className = 'card-actions';
  
  if (loc.embed || loc.gmaps) {
    var mapBtn = document.createElement('button');
    mapBtn.className = 'btn btn-primary';
    mapBtn.innerHTML = '📍 View map';
    mapBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      openModal(idx);
    });
    actions.appendChild(mapBtn);
  }
  
  if (loc.website) {
    var webBtn = document.createElement('a');
    webBtn.className = 'btn btn-secondary';
    webBtn.href = loc.website;
    webBtn.target = '_blank';
    webBtn.rel = 'noopener';
    webBtn.innerHTML = '🔗 Website';
    webBtn.addEventListener('click', function(e) { e.stopPropagation(); });
    actions.appendChild(webBtn);
  }
  
  body.appendChild(actions);
  card.appendChild(body);
  
  card.addEventListener('click', function() {
    openModal(idx);
  });
  
  return card;
}

function renderMain() {
  var main = document.getElementById('main');
  main.innerHTML = '';
  
  var visible = locations.filter(function(l) {
    return currentFilter === 'all' || l.category === currentFilter;
  });
  
  var grouped = {};
  var order = [];
  
  visible.forEach(function(loc) {
    var key = loc.subcategory || '_none_';
    if (!grouped[key]) {
      grouped[key] = [];
      order.push(key);
    }
    grouped[key].push(loc);
  });
  
  order.sort(function(a, b) {
    if (a === '_none_') return -1;
    if (b === '_none_') return 1;
    if (a === 'fancy') return -1;
    if (b === 'fancy') return 1;
    return 0;
  });
  
  order.forEach(function(key) {
    if (key !== '_none_' && subcatLabels[key]) {
      var label = document.createElement('div');
      label.className = 'section-label ' + subcatLabels[key].cls;
      var span = document.createElement('span');
      span.textContent = subcatLabels[key].label;
      label.appendChild(span);
      main.appendChild(label);
    }
    
    var grid = document.createElement('div');
    grid.className = 'grid';
    
    grouped[key].forEach(function(loc) {
      var idx = locations.indexOf(loc);
      var card = createCard(loc, idx);
      grid.appendChild(card);
    });
    
    main.appendChild(grid);
  });
}

function openModal(idx) {
  var loc = locations[idx];
  var overlay = document.getElementById('modalOverlay');
  var title = document.getElementById('modalTitle');
  var note = document.getElementById('modalNote');
  var map = document.getElementById('modalMap');
  var footer = document.getElementById('modalFooter');
  
  title.textContent = loc.name;
  
  if (loc.notes) {
    note.textContent = '"' + loc.notes + '"';
    note.style.display = 'block';
  } else {
    note.style.display = 'none';
  }
  
  map.innerHTML = '';
  
  if (loc.embed) {
    var iframe = document.createElement('iframe');
    iframe.src = loc.embed;
    iframe.setAttribute('allowfullscreen', '');
    iframe.setAttribute('loading', 'lazy');
    iframe.setAttribute('referrerpolicy', 'no-referrer-when-downgrade');
    map.appendChild(iframe);
  } else {
    var noMap = document.createElement('div');
    noMap.className = 'modal-no-map';
    var icon = document.createElement('div');
    icon.className = 'modal-no-map-icon';
    icon.textContent = '🔗';
    var p = document.createElement('p');
    p.textContent = 'No embedded map for this one — but you can still open directions in Google Maps or visit the website.';
    noMap.appendChild(icon);
    noMap.appendChild(p);
    map.appendChild(noMap);
  }
  
  footer.innerHTML = '';
  
  if (loc.gmaps) {
    var dirBtn = document.createElement('a');
    dirBtn.className = 'btn btn-primary';
    dirBtn.href = loc.gmaps;
    dirBtn.target = '_blank';
    dirBtn.rel = 'noopener';
    dirBtn.innerHTML = '📍 Open in Google Maps';
    footer.appendChild(dirBtn);
  }
  
  if (loc.website) {
    var webBtn = document.createElement('a');
    webBtn.className = 'btn btn-secondary';
    webBtn.href = loc.website;
    webBtn.target = '_blank';
    webBtn.rel = 'noopener';
    webBtn.innerHTML = '🔗 Visit website';
    footer.appendChild(webBtn);
  }
  
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  var overlay = document.getElementById('modalOverlay');
  overlay.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

document.getElementById('themeBtn').addEventListener('click', function() {
  var html = document.documentElement;
  var isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').textContent = isDark ? '🌙' : '☀️';
  document.getElementById('themeLabel').textContent = isDark ? 'Dark mode' : 'Light mode';
});

renderNav();
renderMain();
</script>
